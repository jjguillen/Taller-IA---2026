<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Sesión 3 · Imagen, música y vídeo</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@500;600;700&family=Inter:wght@400;500;600;700&family=IBM+Plex+Mono:wght@400;500;600&display=swap" rel="stylesheet">
<style>
  :root{
    --ink:#131029; --panel:#1d1840; --panel-line: rgba(237,234,251,0.10);
    --lime:#d4ff3d; --coral:#ff6b57; --sky:#59c9f1;
    --text:#edeaf6; --muted:#a49bc9;
    --display:'Space Grotesk',sans-serif; --body:'Inter',sans-serif; --mono:'IBM Plex Mono',monospace;
  }
  *{box-sizing:border-box;}
  html,body{margin:0; height:100%; background:var(--ink); color:var(--text); font-family:var(--body);}
  body{
    display:flex; flex-direction:column; align-items:flex-start; justify-content:center;
    padding:8vh 8vw;
    background-image:
      radial-gradient(circle at 8% 12%, rgba(212,255,61,0.06), transparent 40%),
      radial-gradient(circle at 92% 85%, rgba(89,201,241,0.07), transparent 45%);
  }
  .kicker{font-family:var(--mono); color:var(--sky); font-size:14px; letter-spacing:0.08em; text-transform:uppercase;}
  h1{font-family:var(--display); font-weight:700; font-size:clamp(34px,6vw,66px); line-height:1.05; margin:14px 0 12px 0;}
  p{font-size:17px; color:var(--muted); max-width:600px; line-height:1.55;}
  .badge{
    display:inline-flex; align-items:center; gap:8px; font-family:var(--mono); font-size:12px;
    letter-spacing:0.05em; text-transform:uppercase; padding:7px 14px; border-radius:100px;
    background:rgba(255,107,87,0.14); color:var(--coral); border:1px solid rgba(255,107,87,0.3);
    margin-top:22px;
  }
  .badge .b-dot{width:6px; height:6px; border-radius:50%; background:currentColor; animation:pulse 2s infinite;}
  @keyframes pulse{0%{box-shadow:0 0 0 0 rgba(255,107,87,0.5);}70%{box-shadow:0 0 0 8px rgba(255,107,87,0);}100%{box-shadow:0 0 0 0 rgba(255,107,87,0);}}
  a.back{
    margin-top:44px; font-family:var(--mono); font-size:13.5px; color:var(--text);
    text-decoration:none; border:1px solid var(--panel-line); background:var(--panel);
    padding:10px 18px; border-radius:9px; display:inline-flex; align-items:center; gap:8px;
  }
  a.back:hover{border-color:var(--lime); color:var(--lime);}
</style>
</head>
<body>
  <div class="kicker">Taller de IA generativa · Sesión 3 de 4</div>
  <h1>Imagen, música<br>y vídeo</h1>
  <p>Generación de imagen, música y vídeo con IA, más el bloque de ética y privacidad. Esta sesión está en preparación.</p>
  <div class="badge"><span class="b-dot"></span>En construcción</div>
  <a class="back" href="../index.html">← volver al taller</a>
</body>
</html>
